name: 功能建议
description: 提议一个适用于 PaperFlow 的新功能或改进
title: "[功能] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 你遇到的研究或阅读问题
      description: 先描述问题本身，以及它通常在什么情境出现
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你期待的处理方式
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你目前怎样处理
  - type: checkboxes
    id: scope
    attributes:
      label: 适用范围
      options:
        - label: 这项建议仍以用户自己的文献与判断为核心
          required: true
