name: 安装与运行问题
description: 安装、连接 Obsidian 或运行 PaperFlow 时遇到问题
title: "[安装] "
labels:
  - installation
body:
  - type: markdown
    attributes:
      value: |
        谢谢你愿意尝试 PaperFlow。请尽量填写下面的信息，避免附上包含个人资料或未公开文献的截图。
  - type: dropdown
    id: platform
    attributes:
      label: 使用平台
      options:
        - Codex
        - Claude Code
        - 其他
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: 版本信息
      description: PaperFlow、Obsidian 和操作系统版本
      placeholder: PaperFlow v2.0.0 / Obsidian 1.x / macOS 15
    validations:
      required: true
  - type: dropdown
    id: stage
    attributes:
      label: 问题发生在哪一步
      options:
        - 安装 Skill
        - 初始化 PaperFlow 目录
        - 导入或归档 PDF
        - 全文翻译
        - PDF 划词与批注
        - 同步精读笔记
        - 生成或更新线性推理
        - 其他
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 发生了什么
      description: 请写下操作步骤、实际结果与预期结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 错误信息或日志
      description: 请移除账号、路径、API Key、文献正文等敏感内容
      render: shell
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我已检查并移除私人文献、API Key 和其他敏感信息
          required: true
